<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Old+Standard+TT&display=swap" rel="stylesheet">
    <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
    <title>thisfindsyou</title>
    <style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: 'Old Standard TT', serif;
    background-color: #111;
    color: white;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    padding-top: 46px;
    padding-bottom: 50px;
}

/* ── Site nav ── */
.site-nav {
    position: fixed;
    top: calc(20px - 0.3rem);
    left: calc(20px - 0.5rem);
    z-index: 200;
    padding: 0.3rem 0.8rem 0.3rem 0.5rem;
}

.nav-toggle {
    background: none;
    border: none;
    color: white;
    font-family: 'Old Standard TT', serif;
    font-size: 16px;
    letter-spacing: 0.5px;
    opacity: 0.6;
    cursor: pointer;
    padding: 0;
    transition: opacity 0.2s;
}

.site-nav:has(.nav-dropdown.open) .nav-toggle { opacity: 1; }
.site-nav:has(.nav-dropdown.open) {
    background: rgba(17, 17, 17, 0.95);
    backdrop-filter: blur(10px);
}
.nav-dropdown.open { display: flex; margin-top: 0.1rem; }

@media (hover: hover) {
    .site-nav:hover .nav-toggle { opacity: 1; }
    .site-nav:hover {
        background: rgba(17, 17, 17, 0.95);
        backdrop-filter: blur(10px);
    }
    .site-nav:hover .nav-dropdown { display: flex; margin-top: 0.1rem; }
}

.nav-dropdown {
    display: none;
    flex-direction: column;
    gap: 0;
    position: relative;
}

.nav-dropdown a {
    color: rgba(255,255,255,0.5);
    text-decoration: none;
    font-family: 'Old Standard TT', serif;
    font-size: 16px;
    transition: color 0.2s;
    white-space: nowrap;
    line-height: 1.7;
    position: relative;
    padding-left: 16px;
}
.nav-dropdown a::before {
    content: '';
    position: absolute;
    left: 0; top: 50%;
    width: 10px;
    border-top: 1px solid rgba(255,255,255,0.2);
}
.nav-dropdown a::after {
    content: '';
    position: absolute;
    left: 0; top: 0;
    height: 100%;
    border-left: 1px solid rgba(255,255,255,0.2);
}
.nav-dropdown a:last-child::after { height: 50%; }
.nav-dropdown a:hover { color: white; }

/* ── Social footer ── */
.social-footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: rgba(17, 17, 17, 0.97);
    border-top: 1px solid #222;
    padding: 12px 2vw;
    z-index: 50;
    backdrop-filter: blur(10px);
    min-height: 28px;
}

.social-link {
    position: absolute;
    top: 50%;
    transform: translate(-50%, -50%);
}
.social-link.soundcloud { left: 25%; }
.social-link.bandcamp { left: 50%; }
.social-link.instagram { left: 75%; top: calc(50% - 1px); }




.social-link {
    color: #666;
    text-decoration: none;
    display: flex;
    align-items: center;
    transition: color 0.3s ease;
}

.social-link svg {
    width: 22px;
    height: 22px;
    stroke: #666;
    transition: stroke 0.3s ease;
}
@media (hover: hover) {
    .social-link.soundcloud:hover svg { stroke: #FF5500; }
    .social-link.bandcamp:hover svg   { stroke: #0087BE; }
    .social-link.instagram:hover svg  { stroke: #E1306C; }
}
.social-link.soundcloud:active svg { stroke: #FF5500; }
.social-link.bandcamp:active svg   { stroke: #0087BE; }
.social-link.instagram:active svg  { stroke: #E1306C; }
    .social-link.soundcloud svg { width: 28px; height: 28px; }
    .social-link.bandcamp svg { width: 24px; height: 24px; }
    .social-link.instagram svg { width: 16px; height: 16px; }

/* ── Mobile ── */
@media (max-width: 768px) {
    :root { --footer-h: calc(2.4svh + 25px); }
    html { height: -webkit-fill-available; }
    body { height: 100vh; height: -webkit-fill-available; height: 100svh; padding-bottom: var(--footer-h); }
}

.day-nav-btn { color: #da6851; }
</style>
    <link href="assets/css/player.css" rel="stylesheet">
</head>
<body>

    <!-- ── Nav ───────────────────────────────────────────────────────── -->
    <nav class="site-nav" id="siteNav">
        <button class="nav-toggle" id="navToggle" aria-expanded="false" aria-label="Menu">thisfindsyou</button>
        <div class="nav-dropdown" id="navDropdown">
            <a href="/">home</a>
            <a href="/january" id="calNavLink">calendar</a>
            <a href="/portfolio">portfolio</a>
            <a href="/blog">blog</a>
            <a href="/guestbook">guestbook</a>
            <a href="mailto:clovehitch@thisfindsyou.com">contact</a>
        </div>
    </nav>

    <!-- ── Fixed month nav bar: ← January 2026 → ───────────────────── -->
    <div class="month-nav-bar">
        <button class="month-nav-btn" id="prevMonthBtn">←</button>
        <h1 id="monthTitle"></h1>
        <button class="month-nav-btn" id="nextMonthBtn">→</button>
    </div>

    <!-- ── Player (top 50%) ──────────────────────────────────────────── -->
    <section class="player-section">
        <div class="player-inner">
            <div class="player-row">
                <button class="day-nav-btn" id="previous-button" aria-label="Previous day">←</button>
                <div class="image-container" id="image-container">
                    <img id="month-image" src="" alt="" style="display:none">
                    <video id="video-player" playsinline muted style="display:none"></video>
                    <span id="no-image-text" class="no-image-text"></span>
                    <button id="play-pause-btn" class="play-pause-btn" aria-label="Play/Pause">
                        <svg class="play-icon" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
                    </button>
                </div>
                <button class="day-nav-btn" id="next-button" aria-label="Next day">→</button>
            </div>

             <div class="file-info">
                 <span class="file-date" id="fileDate"></span>
                 <span class="file-name" id="fileName"></span>
                 <span class="file-blog-wrap" id="fileBlogWrap" style="display:none"><a id="fileBlog" target="_blank" rel="noopener noreferrer"></a></span>
             </div>
        </div>
    </section>

    <!-- ── Calendar (bottom 50%) ─────────────────────────────────────── -->
    <section class="calendar-section">
        <div class="calendar-grid-wrap">
            <div class="day-headers">
                <div class="day-header">M</div>
                <div class="day-header">T</div>
                <div class="day-header">W</div>
                <div class="day-header">T</div>
                <div class="day-header">F</div>
                <div class="day-header">S</div>
                <div class="day-header">S</div>
            </div>
            <div id="calendar" class="calendar"></div>
        </div>
    </section>

    <!-- ── Global file dropdown ──────────────────────────────────────── -->
    <div id="file-dropdown" role="menu"></div>

    <audio id="audio-player"></audio>

        <!-- ── Fullscreen overlay ────────────────────────────────────────── -->
    <div id="fullscreen-overlay">
        <div class="fullscreen-content">
            <button id="fullscreen-close" aria-label="Close fullscreen">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M6 6l12 12M18 6l-12 12"/></svg>
            </button>
            <img id="fullscreen-image" src="" alt="" style="display:none">
            <video id="fullscreen-video" playsinline style="display:none"></video>
        <button id="fullscreen-play-btn" aria-label="Play/Pause"></button>
        </div>
    </div>

    <!-- ── Social footer ─────────────────────────────────────────────── -->
    <div class="social-footer">
        <a href="https://soundcloud.com/thisfindsyou" target="_blank" class="social-link soundcloud" aria-label="SoundCloud">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 11h1c1.38 0 3 1.274 3 3c0 1.657 -1.5 3 -3 3l-6 0v-10c3 0 4.5 1.5 5 4"/><path d="M9 8l0 9"/><path d="M6 17l0 -7"/><path d="M3 16l0 -2"/></svg>
        </a>
        <a href="https://thisfindsyou.bandcamp.com" target="_blank" class="social-link bandcamp" aria-label="Bandcamp">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 6h13.5l-7 12h-13l6.5 -12"/></svg>
        </a>
        <a href="https://instagram.com/thisfindsyou" target="_blank" class="social-link instagram" aria-label="Instagram">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8a4 4 0 0 1 4 -4h8a4 4 0 0 1 4 4v8a4 4 0 0 1 -4 4h-8a4 4 0 0 1 -4 -4l0 -8"/><path d="M9 12a3 3 0 1 0 6 0a3 3 0 0 0 -6 0"/><path d="M16.5 7.5v.01"/></svg>
        </a>
    </div>

    <script src="assets/js/player.js"></script>
</body>
</html>

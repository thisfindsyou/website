<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Old+Standard+TT&display=swap" rel="stylesheet">
    <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
    <title>thisfindsyou</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
            overflow: hidden;
            flex-direction: column;
            font-family: 'Old Standard TT', serif;
        }

        .top-nav {
            position: absolute;
            top: 20px;
            left: 20px;
            display: flex;
            gap: 1.5rem;
            z-index: 100;
        }

        .top-nav a {
            font-family: 'Old Standard TT', serif;
            color: white;
            text-decoration: none;
            font-size: 18px;
            opacity: 0.5;
            transition: opacity 0.2s ease;
        }

        .top-nav a:hover {
            opacity: 1;
        }

        .image-container {
            position: relative;
            width: 60vw;
            height: 80vh;
            background-color: white;
            border: 5px solid white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
            z-index: 1; /* Keep the image behind the buttons */
        }

        img {
            object-fit: cover;
            width: 100%;
            height: 100%;
        }

        audio {
            display: none; /* Hide the audio controls */
        }

        .controls {
            position: absolute;
            bottom: 20px;
            display: flex;
            justify-content: center;
            width: 100%;
            z-index: 2; /* Ensure buttons are above the image */
        }

        /* Button styles for Backward and Forward buttons */
        .button {
            background-color: transparent;
            border: none;
            padding: 15px;
            font-size: 24px;
            cursor: pointer;
            margin: 0 20px;
            color: #da6851; /* Rust red color for icons */
            transition: color 0.3s ease; /* Only color transition */
            border-radius: 50%;
        }

        .button:hover {
            color: #a84b3b; /* Slightly darker rust red on hover */
        }

        /* Play/Pause Button */
        .play-pause-button {
            position: absolute;
            z-index: 10;
            background: transparent;
            color: white;
            font-size: 32px;
            border: none;
            cursor: pointer;
            pointer-events: none; /* Allow mouse events to pass through the play button */
            transition: transform 0.3s ease;
        }

        .icon {
            width: 30px;
            height: 30px;
        }

        /* Social Media Footer */
        .social-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            border-top: 1px solid #333;
            padding: 1.5vh 2vw;
            display: flex;
            justify-content: center;
            gap: 3vw;
            z-index: 50;
            backdrop-filter: blur(10px);
        }

        .social-link {
            color: #666;
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: color 0.3s ease;
        }

        .social-link svg {
            width: 22px;
            height: 22px;
            fill: #666;
            transition: fill 0.3s ease;
        }

        .social-link.soundcloud:hover svg { fill: #FF5500; }
        .social-link.bandcamp:hover svg  { fill: #0087BE; }
        .social-link.instagram:hover svg { fill: #E1306C; }
        .social-link.tiktok:hover svg    { fill: #FF0050; }


    </style>
</head>
<body>

    <nav class="top-nav">
        <a href="/">calendar</a>
        <a href="/portfolio">portfolio</a>
    </nav>

    <div class="image-container" id="image-container">
        <img src="assets/images/february.png" alt="February">
        
        <!-- Play/Pause Button -->
        <button id="play-pause-button" class="play-pause-button">
            <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg> <!-- Play icon -->
        </button>
    </div>

    <!-- Audio Playlist -->
    <audio id="audio-player" muted>
        <source src="assets/audio/worldpool.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
    </audio>

    <div class="controls">
        <button class="button" id="previous-button">
            <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#da6851"><path d="M5 12l7 7v-4h7v-6h-7v-4l-7 7z"/></svg> <!-- Back icon -->
        </button>
        <button class="button" id="next-button">
            <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#da6851"><path d="M19 12l-7-7v4H5v6h7v4l7-7z"/></svg> <!-- Forward icon -->
        </button>
    </div>

    <!-- Social Media Footer -->
    <div class="social-footer">
        <a href="https://soundcloud.com/thisfindsyou" target="_blank" class="social-link soundcloud" aria-label="SoundCloud">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M11.56 8.87V17h8.76c.96 0 1.76-.8 1.76-1.76 0-.97-.8-1.76-1.76-1.76-.06 0-.12 0-.18.01A3.52 3.52 0 0 0 16.88 11a3.56 3.56 0 0 0-3.19 2 2.64 2.64 0 0 0-2.13-4.13zm-2.37 1.35c-.26 0-.53.02-.79.07v6.71h1.58V10.3a4.43 4.43 0 0 0-.79-.08zm-2.36.98c-.28 0-.56.05-.82.14v5.66h1.64v-5.74a4.43 4.43 0 0 0-.82-.06zm-2.37 1.16c-.32 0-.64.08-.93.22v4.42h1.86v-4.52a3.56 3.56 0 0 0-.93-.12zm-2.36 1.65v2.99h1.58v-2.52a1.33 1.33 0 0 0-.79-.47z"/></svg>
        </a>
        <a href="https://thisfindsyou.bandcamp.com" target="_blank" class="social-link bandcamp" aria-label="Bandcamp">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M0 18.75l7.437-13.5H24l-7.438 13.5z"/></svg>
        </a>
        <a href="https://instagram.com/thisfindsyou" target="_blank" class="social-link instagram" aria-label="Instagram">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
        </a>
        <a href="https://tiktok.com/@thisfindsyou" target="_blank" class="social-link tiktok" aria-label="TikTok">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M19.59 6.69a4.83 4.83 0 01-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 01-2.88 2.5 2.89 2.89 0 01-2.89-2.89 2.89 2.89 0 012.89-2.89c.28 0 .54.04.79.1V9.01a6.33 6.33 0 00-.79-.05 6.34 6.34 0 00-6.34 6.34 6.34 6.34 0 006.34 6.34 6.34 6.34 0 006.33-6.34V8.69a8.18 8.18 0 004.78 1.52V6.75a4.85 4.85 0 01-1.01-.06z"/></svg>
        </a>
    </div>



    <script>
        // Playlist of audio files
        const audioFiles = [
            'assets/audio/worldpool.mp3'
        ];

        const audioPlayer = document.getElementById('audio-player');
        let currentTrack = 0;
        let currentTime = 0; // Store current time for pause and resume
        let volume = 0.5; // Start with 50% volume

        // Function to start the audio playback
        function startAudio() {
            if (audioPlayer.src !== audioFiles[currentTrack]) {
                audioPlayer.src = audioFiles[currentTrack];
                audioPlayer.currentTime = currentTime; // Resume from the last time
            }
            audioPlayer.play();  // Start playing the current track
            audioPlayer.muted = false; // Unmute the audio after the user clicks
            updatePlayPauseButton(true);
        }

        // Function to pause the audio
        function pauseAudio() {
            currentTime = audioPlayer.currentTime; // Store current time when paused
            audioPlayer.pause();
            updatePlayPauseButton(false);
        }

        // Function to update play/pause button
        function updatePlayPauseButton(isPlaying) {
            const button = document.getElementById('play-pause-button');
            if (isPlaying) {
                button.innerHTML = '<svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white"><path d="M19 19H5V5h14v14z"/></svg>'; // Pause icon
            } else {
                button.innerHTML = '<svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>'; // Play icon
            }
        }

        // Handle Play/Pause toggle when clicking anywhere inside the image container
        document.getElementById('image-container').addEventListener('click', () => {
            if (audioPlayer.paused) {
                startAudio();
            } else {
                pauseAudio();
            }
        });

        // Function to change the audio track when one ends
        audioPlayer.addEventListener('ended', () => {
            currentTrack = (currentTrack + 1) % audioFiles.length; // Go to next track
            audioPlayer.src = audioFiles[currentTrack]; // Set the new track
            audioPlayer.play(); // Play the new track
            updatePlayPauseButton(true); // Update the button to show pause icon
        });

        // Handle the "Backwards" button click
        document.getElementById('previous-button').addEventListener('click', () => {
            currentTrack = (currentTrack - 1 + audioFiles.length) % audioFiles.length; // Go to previous track (looping)
            audioPlayer.src = audioFiles[currentTrack]; // Set the new track
            audioPlayer.play(); // Play the new track
            updatePlayPauseButton(true); // Update the button to show pause icon
        });

        // Handle the "Forwards" button click
        document.getElementById('next-button').addEventListener('click', () => {
            currentTrack = (currentTrack + 1) % audioFiles.length; // Go to next track (looping)
            audioPlayer.src = audioFiles[currentTrack]; // Set the new track
            audioPlayer.play(); // Play the new track
            updatePlayPauseButton(true); // Update the button to show pause icon
        });

        // Function to handle volume change based on the mouse position inside the image box
        document.getElementById('image-container').addEventListener('mousemove', (event) => {
            const rect = event.target.getBoundingClientRect();
            const yPosition = event.clientY - rect.top; // Mouse Y position relative to the image
            const newVolume = 1 - (yPosition / rect.height); // Convert to volume range [0, 1]
            volume = Math.max(0, Math.min(1, newVolume)); // Clamp between 0 and 1
            audioPlayer.volume = volume;
            setBackgroundColor(volume); // Adjust background color based on volume
        });

        // Function to change background color based on volume
        function setBackgroundColor(volume) {
            const backgroundColor = `rgb(${volume * 255}, ${volume * 255}, ${volume * 255})`; // From white to black
            document.body.style.backgroundColor = backgroundColor;
        }

        // Start the volume at a mid level
        audioPlayer.volume = volume;
        setBackgroundColor(volume);

        // Handle spacebar press for Play/Pause toggle
        window.addEventListener('keydown', (event) => {
            if (event.code === 'Space') {
                event.preventDefault(); // Prevent the default action of the spacebar (scrolling)
                if (audioPlayer.paused) {
                    startAudio();
                } else {
                    pauseAudio();
                }
            }
        });


    </script>
</body>
</html>

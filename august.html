<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Old+Standard+TT&display=swap" rel="stylesheet">
    <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
    <link rel="preload" as="image" href="assets/images/august.webp">
    <title>thisfindsyou</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            padding-top: 50px;
            padding-bottom: 60px;
            box-sizing: border-box;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #000;
            overflow-y: auto;
            font-family: 'Old Standard TT', serif;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2rem;
            padding: 1rem 2vw;
            flex: 1;
        }

        /* Month Navigation */
        .month-navigation {
            display: flex;
            align-items: center;
            gap: 2rem;
            font-size: 1.5rem;
            letter-spacing: 1px;
            width: 100%;
            justify-content: center;
        }

        .month-nav-button {
            background: none;
            border: none;
            color: white;
            font-family: 'Old Standard TT', serif;
            font-size: 1.3rem;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s ease;
            padding: 0.5rem 1rem;
        }

        .month-nav-button:hover {
            opacity: 1;
        }

        .month-title {
            font-size: 1.5rem;
            letter-spacing: 1px;
            min-width: 200px;
            text-align: center;
        }

        /* Image Container */
        .image-container {
            position: relative;
            width: 55vw;
            height: 400px;
            max-width: 800px;
            background-color: white;
            border: 5px solid white;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            cursor: pointer;
            z-index: 1;
        }

        img {
            object-fit: cover;
            width: 100%;
            height: 100%;
        }

        audio {
            display: none;
        }

        /* File Info Display */
        .file-info {
            text-align: center;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            width: 100%;
            max-width: 600px;
        }

        .file-date {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        .file-name {
            font-size: 1.3rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            word-break: break-word;
        }

        /* Calendar Grid */
        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.5rem;
            width: 100%;
            max-width: 700px;
        }

        .calendar-day-header {
            text-align: center;
            font-weight: bold;
            font-size: 0.8rem;
            opacity: 0.6;
            padding: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .calendar-day {
            aspect-ratio: 1;
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            position: relative;
            background-color: transparent;
            font-size: 0.9rem;
        }

        .calendar-day:hover {
            background-color: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .calendar-day.empty {
            cursor: default;
            opacity: 0.3;
        }

        .calendar-day.empty:hover {
            background-color: transparent;
            border-color: rgba(255, 255, 255, 0.2);
        }

        .calendar-day.has-files {
            border-color: rgba(255, 255, 255, 0.5);
        }

        .calendar-day.selected {
            background-color: white;
            color: #000;
            border-color: white;
            font-weight: bold;
        }

        .day-number {
            font-weight: bold;
        }

        .file-indicator {
            position: absolute;
            top: 4px;
            right: 4px;
            width: 5px;
            height: 5px;
            background-color: white;
            border-radius: 50%;
            opacity: 0.6;
        }

        .calendar-day.selected .file-indicator {
            background-color: #000;
        }

        /* Audio Controls */
        .controls {
            display: flex;
            justify-content: center;
            gap: 2rem;
            width: 100%;
        }

        .button {
            background-color: transparent;
            border: none;
            padding: 10px;
            font-size: 24px;
            cursor: pointer;
            color: #a8c1a2;
            transition: color 0.3s ease;
            border-radius: 50%;
        }

        .button:hover {
            color: #8c9d87;
        }

        .play-pause-button {
            position: absolute;
            z-index: 10;
            background: transparent;
            color: white;
            font-size: 32px;
            border: none;
            cursor: pointer;
            pointer-events: none;
            transition: transform 0.3s ease;
        }

        .icon {
            width: 30px;
            height: 30px;
        }

        /* Site nav — dropdown */
        .site-nav {
            position: fixed;
            top: calc(20px - 0.3rem);
            left: calc(20px - 0.5rem);
            z-index: 200;
            padding: 0.3rem 0.8rem 0.3rem 0.5rem;
        }

        .nav-toggle {
            background: none;
            border: none;
            color: white;
            font-family: 'Old Standard TT', serif;
            font-size: 13px;
            letter-spacing: 0.5px;
            opacity: 0.6;
            cursor: pointer;
            padding: 0;
            transition: opacity 0.2s ease;
        }

        .site-nav:has(.nav-dropdown.open) .nav-toggle {
            opacity: 1;
        }

        .site-nav:has(.nav-dropdown.open) {
            background: rgba(17, 17, 17, 0.95);
            backdrop-filter: blur(10px);
        }

        .nav-dropdown.open {
            display: flex;
            margin-top: 0.1rem;
        }

        @media (hover: hover) {
            .site-nav:hover .nav-toggle {
                opacity: 1;
            }
            .site-nav:hover {
                background: rgba(17, 17, 17, 0.95);
                backdrop-filter: blur(10px);
            }
            .site-nav:hover .nav-dropdown {
                display: flex;
                margin-top: 0.1rem;
            }
        }

        .nav-dropdown {
            display: none;
            flex-direction: column;
            gap: 0;
            position: relative;
        }

        .nav-dropdown a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-family: 'Old Standard TT', serif;
            font-size: 13px;
            transition: color 0.2s ease;
            white-space: nowrap;
            line-height: 1.7;
            position: relative;
            padding-left: 16px;
        }

        .nav-dropdown a::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .nav-dropdown a::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            border-left: 1px solid rgba(255, 255, 255, 0.2);
        }

        .nav-dropdown a:last-child::after {
            height: 50%;
        }

        .nav-dropdown a:hover {
            color: white;
        }

        /* Social Media Footer */
        .social-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.95);
            border-top: 1px solid #333;
            padding: 1.2vh 2vw;
            display: flex;
            justify-content: space-evenly;
            z-index: 50;
            backdrop-filter: blur(10px);
        }

        .social-link {
            color: #666;
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: color 0.3s ease;
        }

        .social-link svg {
            width: 22px;
            height: 22px;
            fill: #666;
            transition: fill 0.3s ease;
        }

        .social-link.soundcloud:hover svg { fill: #FF5500; }
        .social-link.bandcamp:hover svg  { fill: #0087BE; }
        .social-link.instagram:hover svg { fill: #E1306C; }

        @media (max-width: 768px) {
            .main-content {
                gap: 1rem;
                padding: 0.5rem 1vw;
            }

            .image-container {
                width: 90vw;
                height: 250px;
            }

            .month-navigation {
                gap: 1rem;
                font-size: 1.2rem;
            }

            .month-title {
                min-width: 150px;
                font-size: 1.2rem;
            }

            .calendar {
                max-width: 100%;
                gap: 0.3rem;
            }

            .file-info {
                max-width: 100%;
                padding: 0.7rem;
            }

            .file-name {
                font-size: 1rem;
            }
        }
    </style>
</head>

    <script>
        // Configuration
        const MONTHS = ['august', 'august', 'march', 'april', 'may', 'june', 'july', 'august', 'september', 'october', 'november', 'december'];
        const MONTH_NAMES = ['August', 'August', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        const MONTH_IMAGES = {
            'august': 'assets/images/august.webp',
            'august': 'assets/images/august.webp'
        };

        // State
        let calendarData = {};
        let currentMonthIndex = 7; // August
        let selectedDay = null;
        let currentTrack = 0;
        let isPlaying = false;
        let currentTime = 0;
        let currentFiles = [];
        let allDaysWithFiles = [];

        const audioPlayer = document.getElementById('audio-player');

        // Load calendar data
        async function loadCalendarData() {
            try {
                const response = await fetch('/assets/data/calendar.json');
                calendarData = await response.json();
                initializeMonth();
            } catch (error) {
                console.error('Error loading calendar data:', error);
            }
        }

        function getCurrentMonthKey() {
            return `2026-${String(currentMonthIndex + 1).padStart(2, '0')}`;
        }

        function getDaysInMonth(monthIndex) {
            return new Date(2026, monthIndex + 1, 0).getDate();
        }

        function getFirstDayOfMonth(monthIndex) {
            return new Date(2026, monthIndex, 1).getDay();
        }

        function getFilesForDay(day) {
            const monthKey = getCurrentMonthKey();
            if (!calendarData[monthKey]) return [];
            const dayData = calendarData[monthKey].find(d => d.day === day);
            return dayData ? dayData.files : [];
        }

        function buildDaysWithFilesArray() {
            allDaysWithFiles = [];
            const monthKey = getCurrentMonthKey();
            if (calendarData[monthKey]) {
                allDaysWithFiles = calendarData[monthKey].map(d => d.day).sort((a, b) => a - b);
            }
        }

        function renderCalendar() {
            const calendar = document.getElementById('calendar');
            calendar.innerHTML = '';

            // Day headers
            const dayHeaders = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
            dayHeaders.forEach(day => {
                const header = document.createElement('div');
                header.className = 'calendar-day-header';
                header.textContent = day;
                calendar.appendChild(header);
            });

            const daysInMonth = getDaysInMonth(currentMonthIndex);
            const firstDay = getFirstDayOfMonth(currentMonthIndex);

            // Empty cells
            for (let i = 0; i < firstDay; i++) {
                const emptyDay = document.createElement('div');
                emptyDay.className = 'calendar-day empty';
                calendar.appendChild(emptyDay);
            }

            // Days
            for (let day = 1; day <= daysInMonth; day++) {
                const dayCell = document.createElement('div');
                dayCell.className = 'calendar-day';

                const hasFiles = getFilesForDay(day).length > 0;
                if (hasFiles) {
                    dayCell.classList.add('has-files');
                    const indicator = document.createElement('div');
                    indicator.className = 'file-indicator';
                    dayCell.appendChild(indicator);
                }

                if (selectedDay === day) {
                    dayCell.classList.add('selected');
                }

                const dayNum = document.createElement('span');
                dayNum.className = 'day-number';
                dayNum.textContent = day;
                dayCell.appendChild(dayNum);

                if (hasFiles) {
                    dayCell.addEventListener('click', () => selectDay(day));
                }

                calendar.appendChild(dayCell);
            }
        }

        function selectDay(day) {
            selectedDay = day;
            currentFiles = getFilesForDay(day);
            currentTrack = 0;
            renderCalendar();
            updateFileInfo();
            loadAndPlayFile();
        }

        function updateFileInfo() {
            if (!currentFiles || currentFiles.length === 0) {
                document.getElementById('fileDate').textContent = '';
                document.getElementById('fileName').textContent = 'Select a day with files';
                return;
            }

            const dateStr = `${MONTH_NAMES[currentMonthIndex]} ${selectedDay}, 2026`;
            document.getElementById('fileDate').textContent = dateStr;
            document.getElementById('fileName').textContent = currentFiles[currentTrack];
        }

        function loadAndPlayFile() {
            if (!currentFiles || currentFiles.length === 0) return;

            const fileName = currentFiles[currentTrack];
            audioPlayer.src = `assets/audio/${fileName}`;
            audioPlayer.muted = false;
            audioPlayer.play();
            isPlaying = true;
            updatePlayPauseButton();
        }

        function updatePlayPauseButton() {
            const button = document.getElementById('play-pause-button');
            if (isPlaying) {
                button.innerHTML = '<svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white"><path d="M19 19H5V5h14v14z"/></svg>';
            } else {
                button.innerHTML = '<svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>';
            }
        }

        // Arrow navigation between days with files
        function navigateToNextDay() {
            buildDaysWithFilesArray();
            if (allDaysWithFiles.length === 0) return;

            let nextDayIndex = selectedDay ? allDaysWithFiles.indexOf(selectedDay) + 1 : 0;

            if (nextDayIndex >= allDaysWithFiles.length) {
                // Move to next month
                navigateToNextMonth();
                return;
            }

            selectDay(allDaysWithFiles[nextDayIndex]);
        }

        function navigateToPreviousDay() {
            buildDaysWithFilesArray();
            if (allDaysWithFiles.length === 0) return;

            let prevDayIndex = selectedDay ? allDaysWithFiles.indexOf(selectedDay) - 1 : allDaysWithFiles.length - 1;

            if (prevDayIndex < 0) {
                // Move to previous month
                navigateToPreviousMonth();
                return;
            }

            selectDay(allDaysWithFiles[prevDayIndex]);
        }

        function navigateToNextMonth() {
            currentMonthIndex = (currentMonthIndex + 1) % 12;
            
            // If new month has no files, keep navigating
            buildDaysWithFilesArray();
            if (allDaysWithFiles.length === 0) {
                navigateToNextMonth();
                return;
            }

            selectedDay = null;
            updateMonthDisplay();
            renderCalendar();
            selectDay(allDaysWithFiles[0]);
            navigateToPageIfNeeded();
        }

        function navigateToPreviousMonth() {
            currentMonthIndex = (currentMonthIndex - 1 + 12) % 12;
            
            // If new month has no files, keep navigating
            buildDaysWithFilesArray();
            if (allDaysWithFiles.length === 0) {
                navigateToPreviousMonth();
                return;
            }

            selectedDay = null;
            updateMonthDisplay();
            renderCalendar();
            selectDay(allDaysWithFiles[allDaysWithFiles.length - 1]);
            navigateToPageIfNeeded();
        }

        function navigateToPageIfNeeded() {
            const monthName = MONTHS[currentMonthIndex];
            if (monthName !== 'august' && monthName !== 'august') {
                // For now, only august and august exist
                return;
            }
            
            if (window.location.pathname !== `/${monthName}` && window.location.pathname !== `/${monthName}.html`) {
                window.location.href = `/${monthName}`;
            }
        }

        function updateMonthDisplay() {
            document.getElementById('monthTitle').textContent = `${MONTH_NAMES[currentMonthIndex]} 2026`;
            
            // Update image if available
            const monthName = MONTHS[currentMonthIndex];
            const imageSrc = MONTH_IMAGES[monthName] || 'assets/images/august.webp';
            document.querySelector('.image-container img').src = imageSrc;
        }

        function initializeMonth() {
            buildDaysWithFilesArray();
            if (allDaysWithFiles.length > 0) {
                selectDay(allDaysWithFiles[0]);
            }
        }

        // Event Listeners
        document.getElementById('prevMonthBtn').addEventListener('click', navigateToPreviousMonth);
        document.getElementById('nextMonthBtn').addEventListener('click', navigateToNextMonth);

        document.getElementById('previous-button').addEventListener('click', navigateToPreviousDay);
        document.getElementById('next-button').addEventListener('click', navigateToNextDay);

        document.getElementById('image-container').addEventListener('click', () => {
            if (isPlaying) {
                audioPlayer.pause();
                isPlaying = false;
            } else {
                loadAndPlayFile();
            }
            updatePlayPauseButton();
        });

        audioPlayer.addEventListener('ended', navigateToNextDay);

        // Spacebar for play/pause
        window.addEventListener('keydown', (event) => {
            if (event.code === 'Space') {
                event.preventDefault();
                if (isPlaying) {
                    audioPlayer.pause();
                    isPlaying = false;
                } else {
                    loadAndPlayFile();
                }
                updatePlayPauseButton();
            }
        });

        // Arrow keys for navigation
        window.addEventListener('keydown', (event) => {
            if (event.code === 'ArrowRight') {
                event.preventDefault();
                navigateToNextDay();
            } else if (event.code === 'ArrowLeft') {
                event.preventDefault();
                navigateToPreviousDay();
            }
        });

        // Nav dropdown
        (function() {
            var toggle = document.getElementById('navToggle');
            var dropdown = document.getElementById('navDropdown');
            toggle.addEventListener('click', function(e) {
                e.stopPropagation();
                var isOpen = dropdown.classList.toggle('open');
                toggle.setAttribute('aria-expanded', isOpen);
            });
            document.addEventListener('click', function(e) {
                if (!e.target.closest('#siteNav')) {
                    dropdown.classList.remove('open');
                    toggle.setAttribute('aria-expanded', 'false');
                }
            });
        })();

        // Initialize
        loadCalendarData();
    </script>

</body>
</html>

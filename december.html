<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Old+Standard+TT&display=swap" rel="stylesheet">
    <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
    <title>thisfindsyou</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Old Standard TT', serif;
            background-color: #000;
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding-top: 46px;
            padding-bottom: 50px;
        }

        /* ── Player section (top 50%) ─────────────────────────────── */
        .player-section {
            flex: 1;
            min-height: 0;
            display: flex;
            flex-direction: column;
            padding: 0.4rem 1.2rem 0.3rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.12);
        }

        .month-navigation {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
            flex-shrink: 0;
            padding-bottom: 0.3rem;
        }

        .month-nav-btn {
            background: none;
            border: none;
            color: white;
            font-family: 'Old Standard TT', serif;
            font-size: 1rem;
            cursor: pointer;
            opacity: 0.45;
            transition: opacity 0.2s;
            padding: 0.2rem 0.6rem;
            line-height: 1;
        }
        .month-nav-btn:hover { opacity: 1; }

        .month-title {
            font-size: 0.95rem;
            letter-spacing: 1.5px;
            min-width: 160px;
            text-align: center;
            font-weight: normal;
            opacity: 0.9;
        }

        /* player row: prev arrow | image | next arrow */
        .player-row {
            flex: 1;
            min-height: 0;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .day-nav-btn {
            background: none;
            border: none;
            color: #a8c1a2;
            font-family: 'Old Standard TT', serif;
            font-size: 1.3rem;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s;
            padding: 0.5rem 0.4rem;
            flex-shrink: 0;
            line-height: 1;
        }
        .day-nav-btn:hover { opacity: 1; }

        .image-container {
            flex: 1;
            min-width: 0;
            height: 100%;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            background-color: #0a0a0a;
            border: 1px solid rgba(255, 255, 255, 0.18);
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .no-image-text {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgba(255, 255, 255, 0.18);
            font-style: italic;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
            pointer-events: none;
        }

        .play-pause-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            line-height: 0;
        }
        .image-container:hover .play-pause-btn { opacity: 0.85; pointer-events: auto; }
        .play-icon { width: 38px; height: 38px; filter: drop-shadow(0 1px 4px rgba(0,0,0,0.6)); }

        /* file info strip */
        .file-info {
            flex-shrink: 0;
            padding-top: 0.3rem;
            display: flex;
            align-items: baseline;
            justify-content: center;
            gap: 0.6rem;
            min-height: 1.6rem;
        }

        .file-date {
            opacity: 0.4;
            font-size: 0.65rem;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }

        .file-name {
            font-size: 0.8rem;
            font-weight: bold;
            letter-spacing: 0.2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 60vw;
        }

        /* ── Calendar section (bottom 50%) ───────────────────────── */
        .calendar-section {
            flex: 1;
            min-height: 0;
            overflow-y: auto;
            padding: 0.4rem 1.2rem 0.3rem;
        }

        .calendar {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 0.25rem;
            align-content: start;
            height: 100%;
        }

        .cal-cell {
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 0.28rem 0.3rem;
            display: flex;
            flex-direction: column;
            background: transparent;
            cursor: default;
            position: relative;
            transition: border-color 0.15s, background-color 0.15s;
            min-height: 2.2rem;
        }

        .cal-cell.has-files {
            cursor: pointer;
            border-color: rgba(255, 255, 255, 0.28);
        }
        .cal-cell.has-files:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.5);
        }
        .cal-cell.selected {
            background: white;
            color: #000;
            border-color: white;
        }
        .cal-cell.selected:hover { background: rgba(255, 255, 255, 0.92); }
        .cal-cell.empty {
            opacity: 0.12;
            border-color: rgba(255, 255, 255, 0.08);
            cursor: default;
        }

        .day-num {
            font-weight: bold;
            font-size: 0.72rem;
            line-height: 1;
            margin-bottom: 0.12rem;
            flex-shrink: 0;
        }

        .file-list {
            display: flex;
            flex-direction: column;
            gap: 0.04rem;
            overflow: hidden;
        }

        .file-entry {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.57rem;
            opacity: 0.7;
            cursor: pointer;
            line-height: 1.3;
        }
        .file-entry:hover { opacity: 1; text-decoration: underline; }
        .cal-cell.selected .file-entry { opacity: 0.65; color: #000; }
        .cal-cell.selected .file-entry:hover { opacity: 1; }
        .cal-cell.selected .file-entry.active { opacity: 1; font-weight: bold; }
        .file-entry.active { opacity: 1; font-weight: bold; }

        .file-more {
            font-size: 0.55rem;
            opacity: 0.5;
            cursor: pointer;
            font-style: italic;
            line-height: 1.3;
            white-space: nowrap;
        }
        .file-more:hover { opacity: 0.9; }
        .cal-cell.selected .file-more { color: #000; opacity: 0.5; }
        .cal-cell.selected .file-more:hover { opacity: 0.9; }

        /* ── File Dropdown ──────────────────────────────────────────── */
        #file-dropdown {
            position: fixed;
            display: none;
            z-index: 1000;
            background: rgba(12, 12, 12, 0.97);
            border: 1px solid rgba(255, 255, 255, 0.22);
            border-radius: 3px;
            padding: 0.25rem 0;
            min-width: 180px;
            max-width: 300px;
            backdrop-filter: blur(12px);
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.7);
        }

        .dd-item {
            padding: 0.32rem 0.7rem;
            font-size: 0.62rem;
            font-family: 'Old Standard TT', serif;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.6);
            transition: background 0.12s, color 0.12s;
        }
        .dd-item:hover { background: rgba(255,255,255,0.1); color: white; }
        .dd-item.playing { color: white; font-weight: bold; }

        /* ── Site nav ────────────────────────────────────────────────── */
        .site-nav {
            position: fixed;
            top: calc(20px - 0.3rem);
            left: calc(20px - 0.5rem);
            z-index: 200;
            padding: 0.3rem 0.8rem 0.3rem 0.5rem;
        }

        .nav-toggle {
            background: none;
            border: none;
            color: white;
            font-family: 'Old Standard TT', serif;
            font-size: 13px;
            letter-spacing: 0.5px;
            opacity: 0.6;
            cursor: pointer;
            padding: 0;
            transition: opacity 0.2s;
        }

        .site-nav:has(.nav-dropdown.open) .nav-toggle { opacity: 1; }
        .site-nav:has(.nav-dropdown.open) {
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(10px);
        }
        .nav-dropdown.open { display: flex; margin-top: 0.1rem; }

        @media (hover: hover) {
            .site-nav:hover .nav-toggle { opacity: 1; }
            .site-nav:hover {
                background: rgba(0, 0, 0, 0.95);
                backdrop-filter: blur(10px);
            }
            .site-nav:hover .nav-dropdown { display: flex; margin-top: 0.1rem; }
        }

        .nav-dropdown {
            display: none;
            flex-direction: column;
            gap: 0;
            position: relative;
        }

        .nav-dropdown a {
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            font-family: 'Old Standard TT', serif;
            font-size: 13px;
            transition: color 0.2s;
            white-space: nowrap;
            line-height: 1.7;
            position: relative;
            padding-left: 16px;
        }
        .nav-dropdown a::before {
            content: '';
            position: absolute;
            left: 0; top: 50%;
            width: 10px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        .nav-dropdown a::after {
            content: '';
            position: absolute;
            left: 0; top: 0;
            height: 100%;
            border-left: 1px solid rgba(255,255,255,0.2);
        }
        .nav-dropdown a:last-child::after { height: 50%; }
        .nav-dropdown a:hover { color: white; }

        /* ── Social footer ───────────────────────────────────────────── */
        .social-footer {
            position: fixed;
            bottom: 0; left: 0; right: 0;
            background: rgba(0, 0, 0, 0.95);
            border-top: 1px solid #1a1a1a;
            padding: 1.2vh 2vw;
            display: flex;
            justify-content: space-evenly;
            z-index: 50;
            backdrop-filter: blur(10px);
        }

        .social-link {
            color: #555;
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: color 0.3s;
        }
        .social-link svg { width: 20px; height: 20px; fill: #555; transition: fill 0.3s; }
        .social-link.soundcloud:hover svg { fill: #FF5500; }
        .social-link.bandcamp:hover svg   { fill: #0087BE; }
        .social-link.instagram:hover svg  { fill: #E1306C; }

        /* ── Mobile ──────────────────────────────────────────────────── */
        @media (max-width: 768px) {
            .player-section { padding: 0.3rem 0.6rem 0.2rem; }
            .calendar-section { padding: 0.3rem 0.6rem 0.2rem; }
            .month-title { min-width: 130px; font-size: 0.85rem; }
            .day-nav-btn { font-size: 1.1rem; padding: 0.4rem 0.3rem; }
            .file-name { font-size: 0.7rem; max-width: 55vw; }
            .calendar { gap: 0.18rem; }
            .cal-cell { padding: 0.22rem 0.22rem; min-height: 1.8rem; }
            .day-num { font-size: 0.62rem; }
            .file-entry { font-size: 0.5rem; }
            .file-more { font-size: 0.48rem; }
        }
    </style>
</head>

    <script>
    // ── Config ─────────────────────────────────────────────────────────
    const MONTHS = ['january','february','march','april','may','june',
                    'july','august','september','october','november','december'];
    const MONTH_NAMES = ['January','February','March','April','May','June',
                         'July','August','September','October','November','December'];
    const YEAR = new Date().getFullYear();

    // ── Detect month from URL ──────────────────────────────────────────
    const slug = window.location.pathname.replace(/^\//, '').replace(/\.html$/, '');
    let currentMonthIndex = Math.max(0, MONTHS.indexOf(slug));

    // ── State ──────────────────────────────────────────────────────────
    let calendarData = {};
    let selectedDay  = null;
    let currentFiles = [];
    let currentTrack = 0;
    let isPlaying    = false;

    const audioEl = document.getElementById('audio-player');

    // ── Data helpers ───────────────────────────────────────────────────
    function monthKey() {
        return `${YEAR}-${String(currentMonthIndex + 1).padStart(2, '0')}`;
    }

    function daysInMonth(m) { return new Date(YEAR, m + 1, 0).getDate(); }
    function firstDayOf(m)  { return new Date(YEAR, m, 1).getDay(); }

    function filesForDay(day) {
        const data = calendarData[monthKey()];
        if (!data) return [];
        const entry = data.find(d => d.day === day);
        return entry ? entry.files : [];
    }

    function daysWithFiles() {
        const data = calendarData[monthKey()];
        if (!data) return [];
        return data.map(d => d.day).sort((a, b) => a - b);
    }

    // ── Calendar render ────────────────────────────────────────────────
    function renderCalendar() {
        const grid   = document.getElementById('calendar');
        grid.innerHTML = '';

        const days   = daysInMonth(currentMonthIndex);
        const offset = firstDayOf(currentMonthIndex);

        // blank cells before month start
        for (let i = 0; i < offset; i++) {
            const el = document.createElement('div');
            el.className = 'cal-cell empty';
            grid.appendChild(el);
        }

        for (let d = 1; d <= days; d++) {
            const files = filesForDay(d);
            const cell  = document.createElement('div');
            cell.className = 'cal-cell' + (files.length ? ' has-files' : '');
            if (d === selectedDay) cell.classList.add('selected');

            // day number
            const num = document.createElement('div');
            num.className = 'day-num';
            num.textContent = d;
            cell.appendChild(num);

            if (files.length > 0) {
                const list = document.createElement('div');
                list.className = 'file-list';

                // show up to 2 files directly; 3rd slot → "⋯ +N more"
                const showDirect = files.length <= 3 ? files : files.slice(0, 2);

                showDirect.forEach((f, i) => {
                    const item = document.createElement('div');
                    item.className = 'file-entry' + (d === selectedDay && i === currentTrack ? ' active' : '');
                    item.textContent = f;
                    item.addEventListener('click', e => { e.stopPropagation(); selectDay(d, i); });
                    list.appendChild(item);
                });

                if (files.length > 3) {
                    const more = document.createElement('div');
                    more.className = 'file-more';
                    more.textContent = `⋯ +${files.length - 2} more`;
                    more.addEventListener('click', e => { e.stopPropagation(); openDropdown(more, files, d); });
                    list.appendChild(more);
                }

                cell.appendChild(list);
                cell.addEventListener('click', () => selectDay(d, 0));
            }

            grid.appendChild(cell);
        }
    }

    // ── Dropdown ───────────────────────────────────────────────────────
    function openDropdown(triggerEl, files, day) {
        const dd = document.getElementById('file-dropdown');
        dd.innerHTML = '';

        files.forEach((f, i) => {
            const item = document.createElement('div');
            item.className = 'dd-item' + (day === selectedDay && i === currentTrack ? ' playing' : '');
            item.textContent = f;
            item.addEventListener('mousedown', e => {
                e.preventDefault();
                e.stopPropagation();
                selectDay(day, i);
                closeDropdown();
            });
            dd.appendChild(item);
        });

        dd.style.display = 'block';

        const rect  = triggerEl.getBoundingClientRect();
        const ddH   = dd.offsetHeight;
        const below = window.innerHeight - rect.bottom;

        dd.style.top  = (below >= ddH + 8 ? rect.bottom + 4 : rect.top - ddH - 4) + 'px';
        dd.style.left = Math.max(8, Math.min(rect.left, window.innerWidth - 310)) + 'px';
    }

    function closeDropdown() {
        document.getElementById('file-dropdown').style.display = 'none';
    }

    // ── Image ──────────────────────────────────────────────────────────
    function updateImage() {
        const img      = document.getElementById('month-image');
        const noImgEl  = document.getElementById('no-image-text');
        const src      = `assets/images/${MONTHS[currentMonthIndex]}.webp`;

        img.onload  = () => { img.style.display = 'block'; noImgEl.style.display = 'none'; };
        img.onerror = () => { img.style.display = 'none';  noImgEl.style.display = '';     noImgEl.textContent = MONTH_NAMES[currentMonthIndex]; };
        img.src = src;
    }

    // ── Audio ──────────────────────────────────────────────────────────
    function playFile(file) {
        audioEl.src = `assets/audio/${file}`;
        audioEl.muted = false;
        audioEl.play().catch(() => {});
        isPlaying = true;
        updatePlayBtn();
    }

    function togglePlay() {
        if (!currentFiles.length) return;
        if (isPlaying) {
            audioEl.pause();
            isPlaying = false;
        } else {
            audioEl.play().catch(() => {});
            isPlaying = true;
        }
        updatePlayBtn();
    }

    function updatePlayBtn() {
        document.getElementById('play-pause-btn').innerHTML = isPlaying
            ? '<svg class="play-icon" viewBox="0 0 24 24" fill="white"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>'
            : '<svg class="play-icon" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>';
    }

    // ── Selection ──────────────────────────────────────────────────────
    function selectDay(day, trackIndex) {
        selectedDay  = day;
        currentFiles = filesForDay(day);
        currentTrack = typeof trackIndex === 'number'
            ? Math.min(trackIndex, currentFiles.length - 1)
            : 0;
        renderCalendar();
        updateFileInfo();
        if (currentFiles.length) playFile(currentFiles[currentTrack]);
    }

    function updateFileInfo() {
        const dateEl = document.getElementById('fileDate');
        const nameEl = document.getElementById('fileName');
        if (!currentFiles.length || selectedDay === null) {
            dateEl.textContent = '';
            nameEl.textContent = '—';
            return;
        }
        dateEl.textContent = `${MONTH_NAMES[currentMonthIndex]} ${selectedDay}, ${YEAR}`;
        nameEl.textContent = currentFiles[currentTrack];
    }

    // ── Day navigation ─────────────────────────────────────────────────
    function nextDay() {
        const days = daysWithFiles();
        if (!days.length) { goToMonth((currentMonthIndex + 1) % 12, false); return; }

        if (selectedDay === null) { selectDay(days[0]); return; }

        const idx = days.indexOf(selectedDay);
        if (idx === days.length - 1) {
            goToMonth((currentMonthIndex + 1) % 12, false); // first day of next month
        } else {
            selectDay(days[Math.max(0, idx + 1)]);
        }
    }

    function prevDay() {
        const days = daysWithFiles();
        if (!days.length) { goToMonth((currentMonthIndex - 1 + 12) % 12, true); return; }

        if (selectedDay === null) { selectDay(days[days.length - 1]); return; }

        const idx = days.indexOf(selectedDay);
        if (idx <= 0) {
            goToMonth((currentMonthIndex - 1 + 12) % 12, true); // last day of prev month
        } else {
            selectDay(days[idx - 1]);
        }
    }

    // ── Month navigation ───────────────────────────────────────────────
    function goToMonth(newIndex, selectLast) {
        const target  = MONTHS[newIndex];
        const current = window.location.pathname.replace(/^\//, '').replace(/\.html$/, '');

        if (current !== target) {
            if (selectLast) sessionStorage.setItem('calNav', 'last');
            window.location.href = '/' + target;
        } else {
            // same page (shouldn't normally happen, but handle gracefully)
            currentMonthIndex = newIndex;
            const days = daysWithFiles();
            if (days.length) selectDay(selectLast ? days[days.length - 1] : days[0]);
            else { selectedDay = null; currentFiles = []; renderCalendar(); updateFileInfo(); }
        }
    }

    // ── Month title ────────────────────────────────────────────────────
    function updateMonthTitle() {
        document.getElementById('monthTitle').textContent =
            `${MONTH_NAMES[currentMonthIndex]} ${YEAR}`;
    }

    // ── Init ───────────────────────────────────────────────────────────
    function initPage() {
        updateMonthTitle();
        updateImage();

        const days     = daysWithFiles();
        const selectLast = sessionStorage.getItem('calNav') === 'last';
        sessionStorage.removeItem('calNav');

        if (days.length) {
            selectDay(selectLast ? days[days.length - 1] : days[0]);
        } else {
            selectedDay = null;
            currentFiles = [];
            renderCalendar();
            updateFileInfo();
        }
    }

    async function loadCalendarData() {
        try {
            const res  = await fetch('/assets/data/calendar.json');
            calendarData = await res.json();
        } catch(e) {
            console.error('Could not load calendar data', e);
        }
        initPage();
    }

    // ── Event Listeners ────────────────────────────────────────────────
    document.getElementById('prevMonthBtn').addEventListener('click', () => goToMonth((currentMonthIndex - 1 + 12) % 12, false));
    document.getElementById('nextMonthBtn').addEventListener('click', () => goToMonth((currentMonthIndex + 1) % 12, false));
    document.getElementById('previous-button').addEventListener('click', prevDay);
    document.getElementById('next-button').addEventListener('click', nextDay);
    document.getElementById('image-container').addEventListener('click', togglePlay);

    audioEl.addEventListener('ended', nextDay);

    window.addEventListener('keydown', e => {
        if (e.code === 'Space')      { e.preventDefault(); togglePlay(); }
        if (e.code === 'ArrowRight') { e.preventDefault(); nextDay(); }
        if (e.code === 'ArrowLeft')  { e.preventDefault(); prevDay(); }
    });

    // close dropdown on outside click
    document.addEventListener('click', e => {
        if (!e.target.closest('#file-dropdown') && !e.target.closest('.file-more')) {
            closeDropdown();
        }
    });

    // nav dropdown
    (function() {
        const toggle   = document.getElementById('navToggle');
        const dropdown = document.getElementById('navDropdown');
        toggle.addEventListener('click', function(e) {
            e.stopPropagation();
            const open = dropdown.classList.toggle('open');
            toggle.setAttribute('aria-expanded', open);
        });
        document.addEventListener('click', function(e) {
            if (!e.target.closest('#siteNav')) {
                dropdown.classList.remove('open');
                toggle.setAttribute('aria-expanded', 'false');
            }
        });
    })();

    // ── Boot ───────────────────────────────────────────────────────────
    loadCalendarData();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Old+Standard+TT&display=swap" rel="stylesheet">
    <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
    <script defer src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
    <script defer src="assets/js/guestbook.js"></script>
    <title>Guest Book - thisfindsyou</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Old Standard TT', serif;
            background-color: #111;
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 12vh 2vw 52px;
        }

        h1 {
            position: fixed;
            top: 44px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            font-family: 'Old Standard TT', serif;
            font-size: 2.5vh;
            font-weight: normal;
            letter-spacing: 1px;
            white-space: nowrap;
            margin: 0;
        }

        /* ── Site nav ── */
        .site-nav {
            position: fixed;
            top: calc(20px - 0.3rem);
            left: calc(20px - 0.5rem);
            z-index: 200;
            padding: 0.3rem 0.8rem 0.3rem 0.5rem;
        }

        .nav-toggle {
            background: none;
            border: none;
            color: white;
            font-family: 'Old Standard TT', serif;
            font-size: 16px;
            letter-spacing: 0.5px;
            opacity: 0.6;
            cursor: pointer;
            padding: 0;
            transition: opacity 0.2s ease;
        }

        .site-nav:has(.nav-dropdown.open) .nav-toggle { opacity: 1; }
        .site-nav:has(.nav-dropdown.open) { background: rgba(17, 17, 17, 0.95); backdrop-filter: blur(10px); }
        .nav-dropdown.open { display: flex; margin-top: 0.1rem; }

        @media (hover: hover) {
            .site-nav:hover .nav-toggle { opacity: 1; }
            .site-nav:hover { background: rgba(17, 17, 17, 0.95); backdrop-filter: blur(10px); }
            .site-nav:hover .nav-dropdown { display: flex; margin-top: 0.1rem; }
        }

        .nav-dropdown {
            display: none;
            flex-direction: column;
            gap: 0;
            position: relative;
        }

        .nav-dropdown a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-family: 'Old Standard TT', serif;
            font-size: 16px;
            transition: color 0.2s ease;
            white-space: nowrap;
            line-height: 1.7;
            position: relative;
            padding-left: 16px;
        }

        .nav-dropdown a::before {
            content: '';
            position: absolute;
            left: 0; top: 50%;
            width: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .nav-dropdown a::after {
            content: '';
            position: absolute;
            left: 0; top: 0;
            height: 100%;
            border-left: 1px solid rgba(255, 255, 255, 0.2);
        }

        .nav-dropdown a:last-child::after { height: 50%; }
        .nav-dropdown a:hover { color: white; }

        @media (max-width: 768px) {
            .nav-toggle { font-size: 16px; }
            .nav-dropdown a { font-size: 16px; }
        }

        /* ── Guestbook ── */
        .guestbook-wrap {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            min-height: 0;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            min-height: 0;
            position: relative;
            scrollbar-width: thin;
            scrollbar-color: #333 transparent;
        }

        #messagesContent {
            padding-bottom: 48px;
        }

        .messages::-webkit-scrollbar { width: 4px; }
        .messages::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

        .entry {
            padding: 1.6vh 0;
            border-bottom: 1px solid #222;
        }

        .entry-head {
            display: flex;
            align-items: baseline;
            gap: 0.5rem;
            margin-bottom: 0.3rem;
        }

        .entry-name {
            font-size: 0.75rem;
            color: #555;
            letter-spacing: 0.3px;
        }

        .entry-time {
            font-size: 0.65rem;
            color: #444;
        }

        .entry-msg {
            font-size: 1.05rem;
            line-height: 1.4;
            color: white;
            word-wrap: break-word;
        }

        .entry--empty .entry-head {
            visibility: hidden;
        }

        .entry--empty .entry-msg {
            text-align: center;
            font-style: italic;
            color: #444;
        }

        /* ── Input bar ── */
        .input-bar {
            display: flex;
            gap: 0.5rem;
            padding: 0.75rem 0;
            align-items: center;
            border-bottom: 1px solid #222;
        }

        .input-bar input {
            font-family: 'Old Standard TT', serif;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 0.5rem 0.7rem;
            color: white;
            font-size: 0.8rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-bar input:focus { border-color: #557; }
        .input-bar input::placeholder { color: #444; }

        .input-name { width: 110px; flex-shrink: 0; }
        .input-msg { flex: 1; }

        .send-btn {
            font-family: 'Old Standard TT', serif;
            background: none;
            border: 1px solid #333;
            border-radius: 4px;
            color: rgba(255,255,255,0.5);
            padding: 0.5rem 0.8rem;
            font-size: 0.8rem;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover { color: white; border-color: #557; }
        .send-btn:disabled { opacity: 0.3; cursor: default; }
        .send-btn.sending { opacity: 0.5; }

        /* ── Search trigger (floating over messages) ── */
        .search-trigger-wrap {
            position: sticky;
            top: 8px;
            height: 0;
            overflow: visible;
            z-index: 5;
            display: flex;
            justify-content: flex-end;
            pointer-events: none;
        }

        .search-trigger {
            pointer-events: auto;
            background: none;
            border: 1px solid #333;
            border-radius: 4px;
            color: rgba(255,255,255,0.3);
            padding: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.2s, border-color 0.2s;
            width: 28px;
            height: 28px;
            margin-right: 8px;
        }

        .search-trigger:hover { color: white; border-color: #557; }
        .search-trigger.active { color: white; border-color: #557; }

        /* ── Search bar (pop-out) ── */
        .search-bar {
            overflow: hidden;
            max-height: 0;
            opacity: 0;
            transition: max-height 0.3s ease, opacity 0.3s ease, padding 0.3s ease;
            border-bottom: none;
            padding: 0;
        }

        .search-bar.open {
            max-height: 60px;
            opacity: 1;
            padding: 0.5rem 0;
        }

        .search-input {
            font-family: 'Old Standard TT', serif;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 0.5rem 0.7rem;
            color: white;
            font-size: 0.75rem;
            outline: none;
            width: 100%;
            transition: border-color 0.2s;
        }

        .search-input:focus { border-color: #557; }
        .search-input::placeholder { color: #444; }

        /* ── Social footer ── */
        .social-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            border-top: 1px solid #222;
            padding: 12px 2vw;
            background: rgba(17, 17, 17, 0.97);
            z-index: 50;
            backdrop-filter: blur(10px);
            min-height: 28px;
        }

        .social-link {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
        }
        .social-link.soundcloud { left: 25%; }
        .social-link.bandcamp { left: 50%; }
        .social-link.instagram { left: 75%; top: calc(50% - 1px); }




        .social-link {
            color: #666;
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: color 0.3s ease;
        }

        .social-link svg {
            width: 22px;
            height: 22px;
            stroke: #666;
            transition: stroke 0.3s ease;
        }

        @media (hover: hover) {
            .social-link.soundcloud:hover svg { stroke: #FF5500; }
            .social-link.bandcamp:hover svg   { stroke: #0087BE; }
            .social-link.instagram:hover svg  { stroke: #E1306C; }
        }
        .social-link.soundcloud:active svg { stroke: #FF5500; }
        .social-link.bandcamp:active svg   { stroke: #0087BE; }
        .social-link.instagram:active svg  { stroke: #E1306C; }
        .social-link.soundcloud svg { width: 28px; height: 28px; }
        .social-link.bandcamp svg { width: 28px; height: 28px; }
        .social-link.instagram svg { width: 28px; height: 28px; }

        /* ── Mobile ── */
        @media (max-width: 600px) {
            .guestbook-wrap { padding: 0 1rem; }
            .input-name { width: 70px; }
            .input-msg { min-width: 0; }
            .input-bar { gap: 0.3rem; }
            .input-bar input, .search-input { font-size: 16px; }
            .send-btn { font-size: 16px; }
        }
    </style>
</head>
<body>

    <nav class="site-nav" id="siteNav">
        <button class="nav-toggle" id="navToggle" aria-expanded="false" aria-label="Menu">thisfindsyou</button>
        <div class="nav-dropdown" id="navDropdown">
            <a href="/">home</a>
            <a href="/january" id="calNavLink">calendar</a>
            <a href="/portfolio">portfolio</a>
            <a href="/blog">blog</a>
            <a href="/guestbook">guestbook</a>
            <a href="mailto:clovehitch@thisfindsyou.com">contact</a>
        </div>
    </nav>

    <h1>Guest Book</h1>

    <div class="guestbook-wrap">
        <div class="input-bar">
            <input class="input-name" id="inputName" type="text" placeholder="name" maxlength="100" autocomplete="off">
            <input class="input-msg" id="inputMsg" type="text" placeholder="message…" maxlength="2000" autocomplete="off">
            <button class="send-btn" id="sendBtn">send</button>
        </div>

        <div class="search-bar" id="searchBar">
            <input class="search-input" id="searchInput" type="text" placeholder="search entries…" autocomplete="off">
        </div>

        <div class="messages" id="messages">
            <div class="search-trigger-wrap">
                <button class="search-trigger" id="searchTrigger" aria-label="Search entries">
                    <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                        <circle cx="11" cy="11" r="8"/>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                    </svg>
                </button>
            </div>
            <div id="messagesContent"></div>
        </div>
    </div>

    <div class="social-footer">
        <a href="https://soundcloud.com/thisfindsyou" target="_blank" class="social-link soundcloud" aria-label="SoundCloud">

        <a href="https://thisfindsyou.bandcamp.com" target="_blank" class="social-link bandcamp" aria-label="Bandcamp">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M0 18.75l7.437-13.5H24l-7.438 13.5H0z"/></svg>
        </a>
        <a href="https://instagram.com/thisfindsyou" target="_blank" class="social-link instagram" aria-label="Instagram">

        </a>
    </div>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Old+Standard+TT&display=swap" rel="stylesheet">
    <link rel="icon" href="assets/images/favicon.ico" type="image/x-icon">
    <title>Blog - thisfindsyou</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Old Standard TT', serif;
            background-color: #111;
            color: white;
            min-height: 100vh;
            padding: 12vh 2vw 10vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 {
            position: fixed;
            top: 44px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            font-family: 'Old Standard TT', serif;
            font-size: 2.5vh;
            font-weight: normal;
            letter-spacing: 1px;
            white-space: nowrap;
            margin: 0;
        }

        /* Site nav — dropdown */
        .site-nav {
            position: fixed;
            top: calc(20px - 0.3rem);
            left: calc(20px - 0.5rem);
            z-index: 200;
            padding: 0.3rem 0.8rem 0.3rem 0.5rem;
        }

        .nav-toggle {
            background: none;
            border: none;
            color: white;
            font-family: 'Old Standard TT', serif;
            font-size: 16px;
            letter-spacing: 0.5px;
            opacity: 0.6;
            cursor: pointer;
            padding: 0;
            transition: opacity 0.2s ease;
        }

        .site-nav:has(.nav-dropdown.open) .nav-toggle {
            opacity: 1;
        }

        .site-nav:has(.nav-dropdown.open) {
            background: rgba(17, 17, 17, 0.95);
            backdrop-filter: blur(10px);
        }

        .nav-dropdown.open {
            display: flex;
            margin-top: 0.1rem;
        }

        @media (hover: hover) {
            .site-nav:hover .nav-toggle {
                opacity: 1;
            }
            .site-nav:hover {
                background: rgba(17, 17, 17, 0.95);
                backdrop-filter: blur(10px);
            }
            .site-nav:hover .nav-dropdown {
                display: flex;
                margin-top: 0.1rem;
            }
        }

        .nav-dropdown {
            display: none;
            flex-direction: column;
            gap: 0;
            position: relative;
        }

        .nav-dropdown a {
            color: rgba(255, 255, 255, 0.5);
            text-decoration: none;
            font-family: 'Old Standard TT', serif;
            font-size: 16px;
            transition: color 0.2s ease;
            white-space: nowrap;
            line-height: 1.7;
            position: relative;
            padding-left: 16px;
        }

        .nav-dropdown a::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 10px;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
        }

        .nav-dropdown a::after {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            border-left: 1px solid rgba(255, 255, 255, 0.2);
        }

        .nav-dropdown a:last-child::after {
            height: 50%;
        }

        .nav-dropdown a:hover {
            color: white;
        }

        @media (max-width: 768px) {
            .nav-toggle { font-size: 16px; }
            .nav-dropdown a { font-size: 16px; }
        }

        /* Blog content */
        .blog-content {
            max-width: 600px;
            width: 100%;
            margin-top: 2vh;
        }

        .post-list {
            list-style: none;
        }

        .post-entry {
            padding: 1.6vh 0;
            border-bottom: 1px solid #222;
        }

        .post-entry:first-child {
            border-top: 1px solid #222;
        }

        .post-meta {
            margin-bottom: 0.3rem;
        }

        .post-date {
            font-size: 0.75rem;
            color: #555;
            letter-spacing: 0.3px;
            white-space: nowrap;
        }

        .post-title {
            display: block;
            color: white;
            text-decoration: none;
            font-size: 1.05rem;
            line-height: 1.4;
            transition: opacity 0.2s ease;
        }

        .post-title:hover {
            opacity: 0.6;
        }

        .empty-state {
            padding: 4vh 0;
            border-top: 1px solid #222;
            border-bottom: 1px solid #222;
        }

        .empty-state p {
            font-size: 0.85rem;
            color: #444;
            font-style: italic;
        }

        /* Social Media Footer */
        .social-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(17, 17, 17, 0.97);
            border-top: 1px solid #222;
            padding: 12px 2vw;
            z-index: 50;
            backdrop-filter: blur(10px);
            min-height: 28px;
        }

        .social-link {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
        }
        .social-link.soundcloud { left: 25%; }
        .social-link.bandcamp { left: 50%; }
        .social-link.instagram { left: 75%; top: calc(50% - 1px); }




        .social-link {
            color: #666;
            text-decoration: none;
            display: flex;
            align-items: center;
            transition: color 0.3s ease;
        }

        .social-link svg {
            width: 22px;
            height: 22px;
            stroke: #666;
            transition: stroke 0.3s ease;
        }

        @media (hover: hover) {
            .social-link.soundcloud:hover svg { stroke: #FF5500; }
            .social-link.bandcamp:hover svg  { stroke: #0087BE; }
            .social-link.instagram:hover svg { stroke: #E1306C; }
        }
        .social-link.soundcloud svg { width: 28px; height: 28px; }
        .social-link.bandcamp svg { width: 28px; height: 28px; }
        .social-link.instagram svg { width: 28px; height: 28px; }
        .social-link.soundcloud:active svg { stroke: #FF5500; }
        .social-link.bandcamp:active svg   { stroke: #0087BE; }
        .social-link.instagram:active svg  { stroke: #E1306C; }

        @media (max-width: 600px) {
            .blog-content {
                padding: 0 1rem;
            }
        }
    </style>
</head>
<body>

    <nav class="site-nav" id="siteNav">
        <button class="nav-toggle" id="navToggle" aria-expanded="false" aria-label="Menu">thisfindsyou</button>
        <div class="nav-dropdown" id="navDropdown">
            <a href="/">home</a>
            <a href="/january" id="calNavLink">calendar</a>
            <a href="/portfolio">portfolio</a>
            <a href="/blog">blog</a>
            <a href="/guestbook">guestbook</a>
            <a href="mailto:clovehitch@thisfindsyou.com">contact</a>
        </div>
    </nav>

    <h1>Blog</h1>

    <div class="blog-content">
        <ul class="post-list">

            <li class="post-entry">
                <div class="post-meta">
                    <span class="post-date">May 24, 2026</span>
                </div>
                <a href="/blog/2026-05-24-unencumbered?from=blog" class="post-title">unencumbered</a>
            </li>

        </ul>

    </div>

    <!-- Social Media Footer -->
    <div class="social-footer">
        <a href="https://soundcloud.com/thisfindsyou" target="_blank" class="social-link soundcloud" aria-label="SoundCloud">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M23.999 14.165c-.052 1.796-1.612 3.169-3.4 3.169h-8.18a.68.68 0 0 1-.675-.683V7.862a.747.747 0 0 1 .452-.724s.75-.513 2.333-.513a5.364 5.364 0 0 1 2.763.755 5.433 5.433 0 0 1 2.57 3.54c.282-.08.574-.121.868-.12.884 0 1.73.358 2.347.992s.948 1.49.922 2.373ZM10.721 8.421c.247 2.98.427 5.697 0 8.672a.264.264 0 0 1-.53 0c-.395-2.946-.22-5.718 0-8.672a.264.264 0 0 1 .53 0ZM9.072 9.448c.285 2.659.37 4.986-.006 7.655a.277.277 0 0 1-.55 0c-.331-2.63-.256-5.02 0-7.655a.277.277 0 0 1 .556 0Zm-1.663-.257c.27 2.726.39 5.171 0 7.904a.266.266 0 0 1-.532 0c-.38-2.69-.257-5.21 0-7.904a.266.266 0 0 1 .532 0Zm-1.647.77a26.108 26.108 0 0 1-.008 7.147.272.272 0 0 1-.542 0 27.955 27.955 0 0 1 0-7.147.275.275 0 0 1 .55 0Zm-1.67 1.769c.421 1.865.228 3.5-.029 5.388a.257.257 0 0 1-.514 0c-.21-1.858-.398-3.549 0-5.389a.272.272 0 0 1 .543 0Zm-1.655-.273c.388 1.897.26 3.508-.01 5.412-.026.28-.514.283-.54 0-.244-1.878-.347-3.54-.01-5.412a.283.283 0 0 1 .56 0Zm-1.668.911c.4 1.268.257 2.292-.026 3.572a.257.257 0 0 1-.514 0c-.241-1.262-.354-2.312-.023-3.572a.283.283 0 0 1 .563 0Z"/></svg>
        </a>
        <a href="https://thisfindsyou.bandcamp.com" target="_blank" class="social-link bandcamp" aria-label="Bandcamp">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M0 18.75l7.437-13.5H24l-7.438 13.5H0z"/></svg>
        </a>
        <a href="https://instagram.com/thisfindsyou" target="_blank" class="social-link instagram" aria-label="Instagram">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8a4 4 0 0 1 4 -4h8a4 4 0 0 1 4 4v8a4 4 0 0 1 -4 4h-8a4 4 0 0 1 -4 -4l0 -8"/><path d="M9 12a3 3 0 1 0 6 0a3 3 0 0 0 -6 0"/><path d="M16.5 7.5v.01"/></svg>
        </a>
    </div>

    <script>
        // Point calendar nav link to current real-world month
        const MONTHS = ['january','february','march','april','may','june',
                        'july','august','september','october','november','december'];
        document.getElementById('calNavLink').href = '/' + MONTHS[new Date().getMonth()];

        // Nav dropdown toggle (mobile)
        (function() {
            var toggle = document.getElementById('navToggle');
            var dropdown = document.getElementById('navDropdown');
            toggle.addEventListener('click', function(e) {
                e.stopPropagation();
                var isOpen = dropdown.classList.toggle('open');
                toggle.setAttribute('aria-expanded', isOpen);
            });
            document.addEventListener('click', function(e) {
                if (!e.target.closest('#siteNav')) {
                    dropdown.classList.remove('open');
                    toggle.setAttribute('aria-expanded', 'false');
                }
            });
        })();
    </script>

</body>
</html>
